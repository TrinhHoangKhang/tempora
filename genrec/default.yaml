num_proc: 1
cache_dir: cache/       # Usually for raw and processed data
log_dir: logs/
wandb_log_dir: wandb/
ckpt_dir: ckpt/
run_id: genrec_default  # Used as the W&B run name
wandb_entity: ~         # W&B team/username; null uses your default entity
wandb_project: ~        # W&B project; null uses the auto-generated run config name
wandb_tags: []
wandb_notes: ~
rand_seed: 2024
reproducibility: True

train_batch_size: 256
eval_batch_size: 32
lr: 0.0003
weight_decay: 0.0
warmup_steps: 10000
steps: ~
epochs: 150
max_grad_norm: 1.0      # None for no clipping, else a float value
eval_interval: 1        # Evaluate every n epochs
patience: 10 # default: 20            # Early stopping. Stop training after n epochs without improvement. Set to None to disable

topk: [5,10]
metrics: [ndcg,recall]
val_metric: ndcg@10
