# Upgraded version
wandb_tags: [RPGUpgrade]
metadata: sentence

# Config the sentence embedding model
#   Sentence T5
# sent_emb_model: sentence-transformers/sentence-t5-base
# sent_emb_dim: 768
# sent_emb_pca: 128
#   OpenAI Embedding Model
sent_emb_model: text-embedding-3-large
sent_emb_dim: 3072
sent_emb_pca: 512
openai_api_key: ~

sent_emb_batch_size: 512

# Training data: if false, train uses the last window only (same as val/test)
use_sliding_window: True

# Config for the backbone model
max_item_seq_len: 50
n_embd: 448
n_layer: 2
n_head: 4
n_inner: 1024
activation_function: gelu_new
resid_pdrop: 0.0
embd_pdrop: 0.5
attn_pdrop: 0.5
layer_norm_epsilon: 1e-12
initializer_range: 0.02

# Semantic ID configs
n_codebook: 32
codebook_size: 256
opq_use_gpu: False
opq_gpu_id: 0
faiss_omp_num_threads: 32

# RPG configs
#   model
temperature: 0.03 # Beauty
num_beams: 20 # Beauty
n_edges: 200 # Beauty
propagation_steps: 3 # Beauty 
#   decoding graph construction
chunk_size: 1024
num_workers: 64

# DPQ configs
#   dpq_v_dim: Value vector dimension per subspace.
#   Default (commented out) = n_embd // n_codebook = 448 // 32 = 14,
#   which makes DPQ output exactly n_embd with no projection layer needed.
#   Uncomment and change if you want a different output dimension.
# dpq_v_dim: 14
quantizer_temperature: 1.0
min_quantizer_temperature: 0.1
quantizer_temperature_decay: 0.9

# DEBUG configs
tokenizer_debug_n_examples: 0